<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    /* OGP画像用: 1200x630px */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a0533 0%, #2d1b69 40%, #1a0533 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Serif JP', serif;
      overflow: hidden;
      position: relative;
    }

    /* 星の背景 */
    .stars {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.5;
    }

    /* 装飾円 */
    .circle-deco {
      position: absolute;
      border: 1px solid rgba(201, 160, 220, 0.15);
      border-radius: 50%;
    }
    .circle-1 { width: 500px; height: 500px; top: 65px; left: 350px; }
    .circle-2 { width: 400px; height: 400px; top: 115px; left: 400px; }
    .circle-3 { width: 300px; height: 300px; top: 165px; left: 450px; }

    /* メインコンテンツ */
    .content {
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .zodiac-icons {
      font-size: 2rem;
      letter-spacing: 0.3em;
      margin-bottom: 24px;
      color: rgba(201, 160, 220, 0.6);
    }
    .title {
      font-size: 4.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f0c75e, #fce4a8, #f0c75e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.15em;
      margin-bottom: 16px;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #a88fbf;
      letter-spacing: 0.3em;
      margin-bottom: 32px;
    }
    .features {
      display: flex;
      gap: 40px;
      justify-content: center;
    }
    .feature {
      color: #c9a0dc;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 8px 20px;
      border: 1px solid rgba(201, 160, 220, 0.3);
      border-radius: 20px;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* 左右の装飾 */
    .side-deco {
      position: absolute;
      font-size: 3rem;
      color: rgba(240, 199, 94, 0.2);
    }
    .side-left { left: 60px; top: 50%; transform: translateY(-50%); }
    .side-right { right: 60px; top: 50%; transform: translateY(-50%); }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="circle-deco circle-1"></div>
  <div class="circle-deco circle-2"></div>
  <div class="circle-deco circle-3"></div>

  <div class="side-deco side-left">☽</div>
  <div class="side-deco side-right">☆</div>

  <div class="content">
    <div class="zodiac-icons">♈ ♉ ♊ ♋ ♌ ♍ ♎ ♏ ♐ ♑ ♒ ♓</div>
    <div class="title">スタリア</div>
    <div class="subtitle">STARIA</div>
    <div class="features">
      <div class="feature">星座占い</div>
      <div class="feature">数秘術</div>
      <div class="feature">タロット</div>
    </div>
  </div>

  <script>
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      const size = Math.random() * 3 + 0.5;
      star.style.width = size + 'px';
      star.style.height = size + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.opacity = Math.random() * 0.5 + 0.2;
      container.appendChild(star);
    }
  </script>
</body>
</html>
